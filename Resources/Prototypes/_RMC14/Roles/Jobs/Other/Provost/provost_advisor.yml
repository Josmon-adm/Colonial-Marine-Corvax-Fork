- type: job
  parent: CMJobBase
  id: CMProvostAdvisor
  name: rmc-job-name-corp-provost-advisor
  description: rmc-ghost-role-information-provost-advisor-description # CCM14
  whitelisted: true #CCM14
  playTimeTracker: CMJobProvostAdvisor
  ranks:
    RMCRankProvostAdvisor2:
    - !type:RoleTimeRequirement
      role: CMJobProvostAdvisor
      time: 270000 # 75 hours CCM14
    RMCRankProvostAdvisor1:
    - !type:RoleTimeRequirement
      role: CMJobProvostAdvisor
      time: 90000 # 25 hours CCM14
    RMCRankProvostAdvisor: []
  startingGear: RMCGearProvostAdvisor
  icon: RMCJobIconProvostAdvisor
  joinNotifyCrew: false
  supervisors: ccm-job-supervisors-provost  # CCM14
  accessGroups:
  - ShipMasterAccess
  - CCMBaillif # CCM14
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillCqc: 3
        RMCSkillEndurance: 3
        RMCSkillFirearms: 1
        RMCSkillFireman: 2
        RMCSkillMeleeWeapons: 1
        RMCSkillPolice: 2
        RMCSkillLeadership: 2 # CCM14
        RMCSkillMedical: 1 # CCM14
        RMCSkillOverwatch: 1 # CCM14
    - type: SquadArmorWearer
    - type: JobPrefix
      prefix: rmc-job-prefix-provost-advisor
    - type: RMCTrackable
    - type: SeeNewPlayers #CCM14
    - type: MarineOrders #CCM14
    - type: CommandAccent #CCM14
    - type: RMCPointing #CCM14
  hidden: false #CCM14

- type: entity
  id: RMCRandomHumanoidProvostAdvisor
  name: provost ghost role advisor
  suffix: Spawner, Player, Friendly, Low Law Understanding
  components:
  - type: Sprite
    sprite: _RMC14/Objects/CMIDs/provost.rsi
    state: provost
  - type: RandomHumanoidSpawner
    settings: RMCProvostAdvisor

- type: randomHumanoidSettings
  parent: RMCEventHumanoid
  id: RMCProvostAdvisor
  components:
  - type: GhostRole
    name: rmc-ghost-name-corp-provost-advisor
    description: rmc-ghost-role-information-provost-description
    rules: rmc-ghost-role-information-provost-rules
    reregister: false
    job: CMProvostAdvisor
    raffle:
      settings: short
  - type: GhostRoleApplySpecial

- type: startingGear
  id: RMCGearProvostAdvisor
  equipment:
    head: RMCHeadBeretProvostSenior
    eyes: CMGlassesSecurity
    ears: RMCHeadsetProvost
    jumpsuit: CMJumpsuitProvostSenior
    outerClothing: RMCProvostJacketFilled
    gloves: CMHandsBlackMarine # TODO RMC14 black gloves
    shoes: CMBootsBlackFilled
    id: RMCIDCardProvostAdvisor
    belt: CMBeltSecurityMPFilled
    back: CMSatchelSecurityFilledProvost
    pocket1: RMCUniversalRecorder
    pocket2: RMCPouchGeneralLarge # TODO RMC14 3 listening devices
# ///CCM14
- type: entity
  parent: CMSpawnPointJobBase
  id: CCMSpawnPointProvostAdvisor
  name: Bailiffs Advisor spawn point
  components:
  - type: SpawnPoint
    job_id: CMProvostAdvisor
  - type: Sprite
    state: x # todo rmc14 need a spawn location sprite
# //////
- type: playTimeTracker
  id: CMJobProvostAdvisor

- type: jobIcon
  parent: CMJobIconBase
  id: RMCJobIconProvostAdvisor
  icon:
    sprite: _RMC14/Interface/cm_job_icons.rsi
    state: hudsquad_pva
