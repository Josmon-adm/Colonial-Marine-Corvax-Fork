- type: entity
  id: CCMRandomHumanoidSereneEngineer
  name: serene ghost role engineer
  suffix: Spawner, Player
  components:
  - type: Sprite
    layers:
    - sprite: _RMC14/Objects/CMIDs/halcyon.rsi
      state: halcyon
  - type: RandomHumanoidSpawner
    settings: CCMSereneEngineer

- type: randomHumanoidSettings
  parent: RMCEventHumanoid
  id: CCMSereneEngineer
  components:
  - type: GhostRole
    name: ccm-ghost-name-serene-engineer
    description: ccm-ghost-role-information-serene-description
    rules: ccm-ghost-role-information-serene-rules
    reregister: false
    job: CCMSereneEngineer
    raffle:
      settings: short
    requirements:
    - !type:RoleTimeRequirement
      role: CMJobCombatTech
      time: 18000 # 5 Hours
  - type: GhostRoleApplySpecial
    squad: SquadSerene

- type: startingGear
  id: CCMJobSereneEngineer
  equipment:
    id: RMCIDCardHalcyon
    head: CCMHelmetSereneEngineer
    mask: RMCMaskCoifPMC
    ears: CCMHeadsetSerene
    jumpsuit: CCMJumpsuitSereneEngineer
    outerClothing: CCMArmorSereneVestEngineer
    belt: CCMBeltUtilitySereneEngineerFilled
    gloves: CMHandsBlackInsulated
    shoes: RMCBootsSPPFilled
    suitstorage: CCMWeaponSMGType31A2
