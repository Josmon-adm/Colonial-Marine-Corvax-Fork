    pocket1: RMCPouchToolsSocFill
    pocket2: RMCPouchConstructionFillFull
  storage:
    back:
    - CMPackFlare
    - RMCMRESPP
    - BarbedWire15
    - CMSheetMetal50
    - RMCExplosivePlastic
    outerClothing:
    - RMCExplosiveBreachingCharge
    - RMCGrenadeCustomMetalFoam
    pocket1:
    - CMWelder
    - CMEntrenchingTool
    - RMCLightReplacer

- type: playTimeTracker
  id: CCMJobSereneEngineer

- type: jobIcon
  parent: CMJobIconBase
  id: CCMJobIconSereneEngineer
  icon:
    sprite: _CCM14/Interface/cm_job_icons.rsi
    state: serene_engineer