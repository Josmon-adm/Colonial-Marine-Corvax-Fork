- type: job
  parent: CMJobBase
  id: CCMSereneEngineer
  name: ccm-job-name-serene-engineer
  description: ccm-ghost-role-information-serene-description
  playTimeTracker: CCMJobSereneEngineer
  ranks:
    CCMRankSereneMlSerzhant: []
  greeting: ccm-job-greeting-serene
  startingGear: CCMJobSereneEngineer
  icon: CCMJobIconSereneEngineer
  joinNotifyCrew: false
  accessGroups:
  - Colony
  - HospitalCorpsman
  supervisors: cm-job-supervisors-sl
  spawnMenuRoleName: Serene Solutions Engineer
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - Serene
    - type: Skills
      skills:
        RMCSkillFirearms: 2
        RMCSkillPolice: 2
        RMCSkillFireman: 2
        RMCSkillConstruction: 3
        RMCSkillEngineer: 4
        RMCSkillMedical: 1
        RMCSkillEndurance: 3
        RMCSkillJtac: 2
        RMCSkillCqc: 1
        RMCSkillPowerLoader: 2
        RMCSkillVehicles: 2
    - type: JobPrefix
      prefix: ccm-job-prefix-serene
