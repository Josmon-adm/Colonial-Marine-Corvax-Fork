- type: entity
  abstract: true
  parent: Clothing
  id: CCMClothingNeckCapeBase
  components:
  - type: Item
    size: Huge
  - type: Clothing
    quickEquip: true
    slots:
    - neck
  - type: Sprite
    state: icon
  - type: Item
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: EmitSoundOnPickup
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: Tag
    tags:
    - CCMClothingCape

- type: Tag
  id: CCMClothingCape

- type: entity
  abstract: true
  parent: CCMClothingNeckCapeBase
  id: CCMClothingNeckCapeBaseHeadBlocker
  components:
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide

