- type: entity
  parent: CMBeltBaseStorage
  id: CCMBeltUtilitySerene
  name: ST-1 utilitarian belt
  description: An ammo bearing clips with a holster and a little bag, standart equipment among Halcyon Synamics' Serene Solutions mercenaries.
  components:
  - type: Sprite
    sprite: _CCM14/Objects/Clothing/Belt/Serene/standart.rsi
    layers:
    - state: icon
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _CCM14/Objects/Clothing/Belt/Serene/standart.rsi
    slots:
    - belt
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,19,1 # 10 slots, вроде..
    whitelist:
      tags:
      - CCMWeaponPistolType74C
      - CMMagazineRifle
      - CMMagazineSmg
      - CMMagazinePistol
      - DiscreteHealthAnalyzer
      - CMSurgicalLine
      - Crowbar
      - Screwdriver
      - Wirecutter
      - Wrench
      - CableCoil
      - Multitool
      - Flashlight
      - PowerCell
      - CMFireExtinguisherPortable
      - RMCExplosiveBreachingCharge
      - RMCNailgunCompact
      - RMCNailgunTactical
      - RMCCircuitboard
      - RMCSynthResetKey
      components:
      - Welder
      - PowerCell
      - TrayScanner
      - GasAnalyzer
      - LightReplacer
      - EntrenchingTool
  - type: IgnoreContentsSize
    items:
      components:
      - EntrenchingTool
      - LightReplacer
  - type: FixedItemSizeStorage
  - type: LimitedStorage
    limits:
    - popup: rmc-storage-limit-one-gun
      whitelist:
        tags:
        - Sidearm
    - popup: rmc-storage-limit-max-mags
      count: 8
      whitelist:
        tags:
        - CMMagazinePistol
        - CMMagazineRifle
  - type: CMHolster
    whitelist:
      tags:
      - Sidearm

