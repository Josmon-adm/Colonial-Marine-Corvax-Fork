- type: entity
  id: RMCPlanetChancesPolyphemus
  name: Polyphemus
  components:
  - type: RMCPlanetMapPrototype
    map: /Maps/_CCM14/Planets/polyphemus.yml
    camouflage: Classic
    survivorJobs:
    - CMSurvivor: 3
    - CMSurvivorCorporate: 1
    - CMSurvivorDoctor: 2
    - CMSurvivorEngineer: 2
    - CMSurvivorSecurity: 2
    - CMSurvivorScientist: 1
    announcement: "Пехота! Была потеряна связь с отрядом морпехов на аванпосте High Rock Company. После бомбардировки шахт они отправились туда добивать остатки жуков. Видимо, не добили. Теперь наша очередь.
      Для общего понимания,
      Обозначение колонии - аванпост ХРК, под карантином.
      Температура на поверхности составляет 23 °C.
      Заведующий колонии - представитель ХРК Сайли Хильсон.
      Биосканирование Выдаёт ошибку.

      Авторизовано: капитан Леон Гранц"
- type: entity
  id: RMCPlanetChancesNova
  name: Nova Outpost
  components:
  - type: RMCPlanetMapPrototype
    map: /Maps/_CCM14/Planets/nova.yml
    camouflage: Desert
    survivorJobs:
    - CMSurvivor: 1
    - CMSurvivorCorporate: 1
    - CMSurvivorDoctor: 1
    - CMSurvivorEngineer: 1
    - CMSurvivorSecurity: 1
    - CMSurvivorScientist: 1
    announcement: "Пехота! Рядом с нами лежит пустынный мирок Харин — бывший узел снабжения фронта. Нас отправляют туда, чтобы разобраться со взявшимися непонятно откуда ксеноморфами. 
      Для общего понимания,
      Обозначение колонии - бывший узел снабжения, сейчас же - копроративный аванпост добычи.
      Температура на поверхности составляет 31 °C.
      Заведующий колонии - представитель ХРК Рон Горнодыб.
      Биосканирование Выдаёт ошибку.

      За оружие!
      Авторизовано: капитан Леон Гранц"
- type: entity
  id: RMCPlanetChancesWesternForest
  name: Western forest
  components:
  - type: RMCPlanetMapPrototype
    map: /Maps/_CCM14/Planets/westernforest.yml
    camouflage: Snow
    announcement: "Пехота! Был получен сигнал бедствия с горнодобывающей колонии СССП неподалеку отсюда. Поможем нашим товарищам избавиться от заразы.
      Для общего понимания,
      Обозначение колонии - островная исследовательская станция и горнодобывающее предприятие.
      Температура на поверхности составляет 20 °C.
      Заведующий колонии - некто из красных комиссаров, он и отправил сигнал.
      Биосканирование Выдаёт ошибку.
    
      Авторизовано: капитан Леон Гранц"
    selectRandomSurvivorVariant: false
    survivorJobs:
    - CCMSurvivorSPPWesternForestCommander: 1
    - CCMSurvivorSPPWesternForestSupportTech: 1
    - CCMSurvivorSPPWesternForestMedic: 1
    - CCMSurvivorSPPWesternForestBase: 5 # todo 6 when eight survs
    survivorJobVariants:
      CCMSurvivorSPPWesternForestBase:
      - CCMSurvivorSPPWesternForestSpecialist: 1
      - CCMSurvivorSPPWesternForestSquadLeader: 1
      - CCMSurvivorSPPWesternForestRifleman: 3
    survivorJobOverrides:
      CMSurvivor: CCMSurvivorSPPWesternForestBase
      CMSurvivorCorporate: CCMSurvivorSPPWesternForestBase
      CMSurvivorDoctor: CCMSurvivorSPPWesternForestMedic
      CMSurvivorEngineer: CCMSurvivorSPPWesternForestSupportTech
      CMSurvivorSecurity: CCMSurvivorSPPWesternForestBase
      CMSurvivorScientist: CCMSurvivorSPPWesternForestBase
      RMCSurvivorCommandingOfficer: CCMSurvivorSPPWesternForestCommander

