  components:
  - type: Sprite
    sprite: _CCM14/Objects/Weapons/Guns/Rifles/Type33a/type33_inhands.rsi
    layers:
    - state: base
      sprite: _CCM14/Objects/Weapons/Guns/Rifles/Type33a/type33_icon.rsi
    - state: bolt-open
      sprite: _CCM14/Objects/Weapons/Guns/Rifles/Type33a/type33_icon.rsi
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      sprite: _CCM14/Objects/Weapons/Guns/Rifles/Type33a/type33_icon.rsi
      map: [ "enum.GunVisualLayers.Mag" ]
