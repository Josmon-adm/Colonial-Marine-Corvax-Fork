- type: entity
  parent: RMCSmartGunNoCamo
  id: CCMSmartGunHeavyML99A
  name: ML99A smart auto gun
  description: Heavy and slower version of ML66A SmartGun. Have installed attachement - ML109A Smart Attachement gun.
  suffix: PMC
  components:
  - type: Sprite
    sprite: _CCM14/Objects/Weapons/Guns/Smartguns/ml99a.rsi
    layers:
    - state: base
      sprite: _CCM14/Objects/Weapons/Guns/Smartguns/ml99a.rsi
    - state: mag-0
      sprite: _CCM14/Objects/Weapons/Guns/Smartguns/ml99a.rsi
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _CCM14/Objects/Weapons/Guns/Smartguns/ml99a.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CCMMagazineSmartGunML99A
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_sg_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_sg_unload.ogg
        priority: 2
        whitelist:
          tags:
          - CCMMagazineSmartGunHeavy
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: RMCPowerCellSmartgun
        whitelist:
          components:
          - SmartGunBattery
  - type: GunToggleableAmmo
    settings:
    - damage:
        types:
          Piercing: 60
      armorPiercing: 5
      name: rmc-toggleable-ammo-highly-precise
      icon:
        sprite: _RMC14/Actions/marine_smart_gun_actions.rsi
        state: ammo_swap_normal
    - damage:
        types:
          Piercing: 45
      armorPiercing: 45
      name: rmc-toggleable-ammo-armor-shredding
      icon:
        sprite: _RMC14/Actions/marine_smart_gun_actions.rsi
        state: ammo_swap_ap
  - type: RMCSelectiveFire
    baseFireModes:
    - FullAuto
    recoilWielded: 3
    scatterWielded: 10
    baseFireRate: 1.8
    burstScatterMult: 4
    modifiers:
      FullAuto:
        maxScatterModifier: 4
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 80
  - type: AttachableHolder
    slots:
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
      rmc-aslot-underbarrel:
        locked: true
        startingAttachable: CCMAttachmentML109AUnderbarrel
        whitelist:
          tags:
          - CCMAttachmentML109AUnderbarrel
  - type: Gun
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_CCM14/Weapons/Guns/Gunshots/ml99a.ogg
      params:
        volume: -2
  - type: ClothingSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.6
  - type: HeldSpeedModifier

- type: entity
  parent: RMCMagazineSmartGun
  id: CCMMagazineSmartGunML99A
  name: "ML99A drum magazine heavy (17.5x30mm)"
  components:
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CCMCartridgeSmartGunML99A
    proto: CCMCartridgeSmartGunML99A
    capacity: 150
  - type: Sprite
    sprite: _CCM14/Objects/Weapons/Ammunition/Smartgun/ml99a_magazine.rsi
  - type: Tag
    tags:
    - CCMMagazineSmartGunHeavy

- type: entity
  parent: CMBaseCartridgeRifle
  id: CCMCartridgeSmartGunML99A
  name: cartridge (17.5x30mm)
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/large_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: CartridgeAmmo
    proto: CCMBulletSmartGunML99A
  - type: Tag
    tags:
    - CCMCartridgeSmartGunML99A

- type: entity
  parent: CMBulletSmartGun10x30mm
  id: CCMBulletSmartGunML99A
  name: bullet (17.5x30mm)
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 60
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 15
      falloff: 9999
      ignoreModifiers: true
    - range: 8
      falloff: 5

