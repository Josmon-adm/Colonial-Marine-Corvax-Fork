# Attachement

- type: entity
  parent: 
  - RMCUnderAttachmentBase
  - RMCAttachableToggleableBase
  id: CCMAttachmentML109AUnderbarrel
  name: ML109A Smart attachement
  description: Who even read this
  suffix: DO NOT MAP
  components:
  - type: Sprite
    state: masterkey
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel
    - CCMAttachmentML109AUnderbarrel
  - type: Item
    size: Normal
  - type: Gun
    fireRate: 3.33
    minAngle: 0
    maxAngle: 0
    angleIncrease: 0
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_CCM14/Weapons/Guns/Gunshots/ml109a.ogg
      params:
        volume: -2
  - type: GunDamageModifier
    multiplier: 1
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: RMCAmmoEject
    containerID: ballistic-ammo
    ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_unload.ogg
        priority: 2
        whitelist:
          tags:
          - CCMMagazineSmartGunML109AFlak
          - CCMMagazineSmartGunML109AAS
  - type: GunPointBlank
  - type: AttachableToggleable
    userOnly: true
    attachedOnly: true
    supercedeHolder: true
    wieldedUseOnly: true
    activatePopupText: attachable-popup-switch-to-generic
    deactivatePopupText: attachable-popup-switch-from-generic
    activateSound:
      path: /Audio/_RMC14/Attachable/gun_u7_activate.ogg
      params:
        volume: -2
    actionName: Switch to the ML109 Underbarrel smart attachement
    actionDesc: Switch to using the underbarrel smart gun
    icon:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
      state: flamer_nozzle 
    iconActive:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
      state: flamer_nozzle-on
  - type: AttachableVisuals
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/shotgun_mouse.rsi
      state: all
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 999
    accuracyMultiplierUnwielded: 999
  - type: MagazineAmmoProvider
    autoEject: true
  - type: AmmoCounter
  - type: GunIFF
    enabled: true

