- type: entity
  parent: CMBaseWeaponSMG
  name: Type-31a2 Submachinegun
  id: CCMWeaponSMGType31A2
  description: A reliable submachinegun made by Halcyon Dynamics exclusively for their Serene Solutions mercenaries.
  suffix: Filled
  components:
  - type: Sprite
    sprite: _CCM14/Objects/Weapons/Guns/SMGs/Type31a2/type31_inhands.rsi
    layers:
    - state: base
      sprite: _CCM14/Objects/Weapons/Guns/SMGs/Type31a2/type31_icon.rsi
    - state: bolt-open
      sprite: _CCM14/Objects/Weapons/Guns/SMGs/Type31a2/type31_icon.rsi
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      sprite: _CCM14/Objects/Weapons/Guns/SMGs/Type31a2/type31_icon.rsi
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _CCM14/Objects/Weapons/Guns/SMGs/Type31a2/type31_inhands.rsi
  - type: Gun
    shotsPerBurst: 3
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/pdw90_shot.ogg # TODO SMG HEAVY Sound
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilWielded: 0.1
    recoilUnwielded: 1
    scatterWielded: 6
    scatterUnwielded: 12
    baseFireRate: 6
    burstScatterMult: 4
    modifiers:
      Burst:
        fireDelay: 0.0980
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
      FullAuto:
        maxScatterModifier: 2
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 8
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.25
    accuracyMultiplierUnwielded: 0.7
  - type: MagazineAmmoProvider
    autoEject: true
    soundAutoEject: null
  - type: WieldableSpeedModifiers
    base: 0.9
    light: 1
    medium: 1
    heavy: 1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RMCMagazineSMGType19
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineSMGType19
          - RMCMagazineSMGType19Drum
  - type: GunDamageModifier
    multiplier: 1.3