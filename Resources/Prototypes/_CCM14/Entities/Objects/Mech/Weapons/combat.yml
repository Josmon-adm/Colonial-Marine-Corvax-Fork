- type: entity
  parent: BaseItem
  id: CCMBaseMechEquipment
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
  - type: Item
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    size: Ginormous
  - type: CCMMechEquipment

- type: entity
  id: CCMBaseMechWeaponRange
  parent: CCMBaseMechEquipment
  abstract: true
  components:
  - type: Appearance
  - type: Item
    size: Ginormous
  - type: MultiHandedItem
  - type: ClothingSpeedModifier
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: HeldSpeedModifier

- type: entity
  id: CCMWeaponMechCombatAssaultRifle
  name: Mounted Assault Rifle
  description: Mounted assault rifle, used for combat exosuits
  suffix: Mech Weapon, Assault Rifle
  parent: [ BaseWeaponSubMachineGun, CCMBaseMechWeaponRange ]
  components:
  - type: Sprite
    sprite: _CCM14/Objects/Mech/weapons.rsi
    state: assaultrifle
  - type: MeleeWeapon
    hidden: true
    range: 2
    attackRate: 1
    damage:
      types:
        Blunt: 40
        Structural: 100
  - type: GunDamageModifier
    multiplier: 1.1
  - type: ChamberMagazineAmmoProvider
    boltClosed: null
  - type: Gun
    fireRate: 3.5
    minAngle: 1
    maxAngle: 6
    angleIncrease: 1.5
    angleDecay: 6
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      collection: CMM54CShoot
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: CMAmmoBoxMountedRifle
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_unload.ogg
        priority: 2
        whitelist:
          tags:
          - CMAmmoBoxMountedRifle
          - CMAmmoBoxMountedRifleAP
          - CMAmmoBoxMountedRifleIncendiary
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CMCartridgeRifle10x24mm
        priority: 1
        whitelist:
          tags:
            - CMCartridgeRifle10x24mm
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance