- type: entity
  parent: BaseItem
  id: CMAmmoBoxMountedRifle
  name: "Mounted Rifle magazine box (10x24mm)"
  components:
  - type: Tag
    tags:
    - CMAmmoBoxMountedRifle
  - type: Item
    size: Normal
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - CMCartridgeRifle10x24mm
    proto: CMCartridgeRifle10x24mm
    capacity: 60
  - type: Sprite
    sprite: _CCM14/Objects/Mech/ammunition.rsi
    layers:
    - state: assaultrifle_ammo_e
      map: ["enum.GunVisualLayers.Base"]
    - state: assaultrifle_ammo-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: assaultrifle_ammo
    steps: 2
    zeroVisible: false
    zeroOnlyOnEmpty: true
  - type: Appearance
  - type: RefillableByBulletBox
    bulletType: RMCBoxBulletsRifle

- type: entity
  parent: CMAmmoBoxMountedRifle
  id: CMAmmoBoxMountedRifleCAP
  name: "Mounted Rifle AP magazine box (10x24mm)"
  suffix: AP
  components:
  - type: Tag
    tags:
    - CMAmmoBoxMountedRifleAP
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CMCartridgeRifle10x24mmAP
    proto: CMCartridgeRifle10x24mmAP
  - type: Sprite
    sprite: _CCM14/Objects/Mech/ammunition.rsi
    layers:
    - state: assaultrifle_ammo_e
      map: ["enum.GunVisualLayers.Base"]
    - state: assaultrifle_ammo-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: ammo_band
      color: "#1F951F"
  - type: RefillableByBulletBox
    bulletType: RMCBoxBulletsRifleAP

- type: entity
