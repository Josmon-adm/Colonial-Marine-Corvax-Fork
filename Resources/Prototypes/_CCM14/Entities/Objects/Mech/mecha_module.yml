- type: entity
  id: MechModuleBase
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    sprite: _CCM14/Objects/Mech/mecha_modules.rsi
  - type: Item
    sprite: _CCM14/Objects/Mech/mecha_modules.rsi
    size: Ginormous
  - type: MultiHandedItem
  - type: CCMMechModule
  - type: GuideHelp
    guides:
    - Robotics

- type: entity
  id: MechModuleTeslaRelay
  parent: [ MechModuleBase ]
  name: tesla energy relay module
  description: Connects the mech to nearby APCs and trickle-charges its battery.
  components:
  - type: Sprite
    state: tesla
  - type: CCMMechGeneratorModule
    generationType: TeslaRelay
    tesla:
      chargeRate: 10
      radius: 3
  - type: UIFragment
    ui: !type:MechGeneratorUi

