- type: entity
  id: BaseCCMMech
  save: false
  abstract: true
  components:
  - type: MobMover
  - type: CCMMech
    entrySuccessSound: /Audio/_CCM14/Effects/nominal.ogg
    brokenSound: /Audio/_CCM14/Effects/critdestr.ogg
  - type: ItemTogglePointLight
  - type: HandheldLight
    toggleOnInteract: false
    wattage: 0.2
    toggleAction: ActionMechToggleLight
  - type: ToggleableVisuals
    spriteLayer: light
  - type: PointLight
    color: "#820000FF"
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 6
    energy: 2
    enabled: false
  - type: CCMVehicle
  - type: CCMContainerVehicle
    containerId: "mech-pilot-slot"
  - type: DoAfter
  - type: Repairable
    fuelCost: 25
    doAfterDelay: 10
  - type: UserInterface
    interfaces:
      enum.CCMMechUiKey.Key:
        type: MechBoundUserInterface
  - type: ActivatableUI
    key: enum.CCMMechUiKey.Key
  - type: MeleeWeapon
    hidden: true
    attackRate: 0.75
    damage:
      types:
        Blunt: 25 #thwack
        Structural: 20
    soundHit:
      collection: MetalThud
  - type: Puller
    needsHands: false
  - type: InputMover
  - type: InteractionOutline
  - type: MovementSpeedModifier
    baseWalkSpeed: 1
    baseSprintSpeed: 2
  - type: Alerts
  - type: Actions
  - type: ActionGrant
    actions:
    - ActionMechCycleEquipment
    - ActionMechOpenUI
    - ActionMechEject
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
  - type: Pullable
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: WiresPanel
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.95
        density: 1000
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Appearance
  - type: ContainerContainer
    containers:
      mech-pilot-slot: !type:ContainerSlot
      mech-equipment-container: !type:Container
      cell_slot: !type:ContainerSlot
      mech-passive-module-container: !type:Container
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: LightArmor
  - type: Construction
    graph: MechDisassemble
    node: start
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/mechmove03.ogg
  - type: GuideHelp
    guides:
    - Robotics
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10000
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Charger
    slotId: mech-equipment-container
    chargeRate: 5
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: true
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        disableEject: true
        swap: false

# Gygax
- type: entity
  id: CCMCombatMech
  parent: [ BaseCCMMech]
  name: Jugger EX-7
  components:
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    sprite: _CCM14/Objects/Mech/mecha.rsi
    layers:
    - map: [ "enum.MechVisualLayers.Base" ]
      state: mech
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
  - type: CCMMech
    maxIntegrity: 1000
    maxEquipmentAmount: 4
    baseState: mech
    openState: mech-open
    brokenState: mech-broken
  - type: CCMVehicle
    transferDamageModifier:
      coefficients:
        Blunt: 0
        Slash: 0
        Piercing: 0
        Cold: 0
        Heat: 0
        Shock: 0
    pilotWhitelist:
      components:
        - HumanoidAppearance
  - type: MeleeWeapon
    hidden: true
    range: 2
    attackRate: 1
    damage:
      types:
        Blunt: 40
        Structural: 100
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 2.6
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCageHigh
        disableEject: true
        swap: false

- type: damageModifierSet
  id: LightArmor
  coefficients:
    Blunt: 0.75
    Slash: 0.75
    Piercing: 0.7
    Shock: 1.2
    Heat: 0.7
