# // CCM Xeno Strain - Boxer Warrior
- type: entity
  parent: CMXenoWarrior
  id: CCMXenoWarriorBoxer
  suffix: CCM-Boxer
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Warrior/boxer.rsi
  - type: XenoStrain
    name: ccm-xeno-boxer-name
    description: ccm-xeno-boxer-description
    popup: ccm-xeno-boxer-popup
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoDevolve
    - CCMActionXenoBoxerComeToMe
    - CCMActionXenoBoxerStand
  - type: YautjaAbomination
    announceDelay: 99999999999
    maxKills: 4
    damagePerKill: 3
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: CCMWeaponArcXenoPunch
    damage:
      groups:
        Brute: 23
  - type: Tackle
    max: 6
    min: 3
  - type: XenoRage
    rageDecayTime: 4
    maxRage: 999
    armorPerRage: 0
    speedBuffPerRage: 0.15
    attackSpeedPerRage: 0.25
    healAmount: 0
  - type: XenoEvolution
    max: 500
    evolvesTo:
    - RMCXenoCrusher
    - CMXenoPraetorian
    strains: []
  - type: XenoHidden
  - type: RMCSize
    size: Big
  - type: XenoCleave
    flingDistance: -4
    rootTime: 3
  - type: XenoLifesteal
    basePercentage: 0.01
    maxPercentage: 0.02
    maxEffect: CCMBoxerEffectHealing
    maxHeal: 0
    minHeal: 0
# // CCM Xeno Punch Attack Effect
- type: entity
  parent: [WeaponArcClaw, RMCBaseEffect]
  id: CCMWeaponArcXenoPunch
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.4
  - type: Sprite
    sprite: _RMC14/Effects/attacks.rsi
    state: punch
    noRot: true
# // CCM Xeno Punch Attack Effect
# // CCM Xeno Heal Effect
- type: entity
  parent: RMCEffectHeal
  id: CCMBoxerEffectHealing
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 5
  - type: Sprite
    scale: 0.7, 0.7
    color: "#FFFFFF"
    state: busy_medical
  - type: DamageOverTime
    affectsDead: false
    affectsInfectedNested: false
    armorPiercingDamage:
      types:
        Heat: -1
      groups:
        Blunt: -1
    damage:
      types:
        Heat: -1
      groups:
        Blunt: -1
    barricadeDamage:
      types:
        Heat: 0
    whitelist:
      components:
      - YautjaAbomination # Im lazy as shi
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        mask:
        - MobMask
        layer:
        - MidImpassable
# // CCM Xeno Heal Effect
