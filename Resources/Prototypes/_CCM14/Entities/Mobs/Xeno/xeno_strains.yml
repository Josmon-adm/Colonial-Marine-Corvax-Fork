# // CCM Xeno Strain - Melee & Ranger Sentinels
- type: entity
  parent: CMXenoSentinel
  id: CCMXenoMeleeSentinel
  suffix: CCM-Melee
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Sentinel/melee.rsi
  - type: XenoStrain
    name: ccm-xeno-meleesent-name
    description: ccm-xeno-meleesent-description
    popup: ccm-xeno-meleesent-popup
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoAcidWeak
    - ActionXenoPunch
    - CCMActionXenoLightNeuroEmpower
    - CCMActionXenoGreaterParalyzingSlash
    - ActionXenoDevolve
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 30
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 45
  - type: XenoPunch
    range: 3
    damage:
      types:
        Blunt: 30
  - type: XenoParalyzingSlash
    stunDelay: 1
    stunDuration: 2
  - type: XenoCripplingStrike
    activateText: rmc-xeno-apprehend-activate
    deactivateText: rmc-xeno-apprehend-deactivate
    expireText: rmc-xeno-apprehend-expire
    removeOnHit: true
    preventTackle: true
    resetMeleeCooldown: true
    damageMult: 1
    speed: 1.2
  - type: CMArmor
    xenoArmor: 15
    explosionArmor: 35
  - type: XenoEvolution
    canEvolveWithoutGranter: true
    max: 200
    evolvesTo:
    - CMXenoSpitter
    evolvesToWithoutPoints:
    - CMXenoQueen
    strains: []
  - type: XenoHidden
  - type: XenoRegen
    critHealMultiplier: 0.5  # 5% increased regeneration
    standHealingMultiplier: 0.8
    restHealMultiplier: 1.777

- type: entity
  parent: CMXenoSentinel
