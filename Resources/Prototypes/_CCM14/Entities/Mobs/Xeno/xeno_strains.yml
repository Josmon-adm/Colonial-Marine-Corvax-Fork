# // CCM Xeno Strain - Burrower Impaler
- type: entity
  parent: CMXenoBurrower
  id: CCMXenoBurrowerImpaler
  name: Burrower
  description: A beefy alien with sharp claws.
  suffix: CCM-Impaler
  components:
  - type: Sprite
    sprite: _CCM14/Mobs/Xenonids/Burrower/impaler.rsi
  - type: XenoStrain
    name: ccm-xeno-impaler-name
    description: ccm-xeno-impaler-description
    popup: ccm-xeno-impaler-popup
  - type: XenoHidden
  - type: XenoConstruction
    canOrderConstruction:
    - HiveCoreXenoConstructionNode
    - HiveEggMorpherXenoConstructionNode
    - HiveClusterXenoConstructionNode
    - HiveRecoveryNodeXenoConstructionNode
    - HivePlasmaTreeXenoConstructionNode
  - type: Polymorphable
  - type: Xeno
    role: CMXenoBurrower
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoAcidNormal
    - ActionXenoOrderConstruction
    - ActionXenoBurrow
    - ActionXenoDigTunnel
    - CCMActionJauntBurrow
    - CCMActionXenoBurrowerImpale
    - ActionXenoDevolve
    tier: 2
    hudOffset: -0.15,0.56
    unlockAt: 420 # 7 minutes
  - type: XenoBurrow
    maxTunnelingDistance: 20
    burrowMaxDuration: 13
    unburrowStunRange: 0.75
    unburrowStunLength: 2
    minimumTunnelTime: 0.3
  - type: XenoSprayAcid
    acid: CCMXenoBurrowerImpalerSpike
    sound: /Audio/_RMC14/Xeno/burrowing_b.ogg
    doAfter: 0.8
    barricadeDuration: 0
    barricadeDamage:
      types:
        Heat: 0
  - type: XenoEvolution
    strains: []
# Burrower Jaunt
- type: entity
  name: Burrower
  description: Burrowed Burrower, dont step on spikes!
  parent: 
  - BaseMob
  - RMCXenoMobCollision
  - CMXenoBurrower
  id: CCMBurrowerBurrowedJaunt
  suffix: CCM-Impaler-Burrowed
  components:
  - type: Sprite
    offset: 0,0.5
    sprite: _CCM14/Objects/Xeno/xeno_64x64.rsi
    state: alive
  - type: MovementSpeedModifier
    baseSprintSpeed: 6
    baseWalkSpeed: 3
  - type: DamageOnCollide
    paralyze: 2
    canRehit: false
    armorPenetration: 20
    damage:
      types:
        Blunt: 30
        Structural: 100
    whitelist:
      components:
      - Marine
      - Vehicle
  - type: InputMover
  - type: XenoHidden
  - type: AutoAssignHive
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.5
        density: 10
        mask:
        - MobMask
        - BarricadeImpassable
        - BarbedBarricade
        layer:
        - Opaque
  - type: Xeno
    role: CMXenoBurrower
    actionIds:
    - CCMActionXenoBurrowerImpale
    tier: 2
    hudOffset: -0,0.2
    unlockAt: 420 # 7 minutes
  - type: XenoSprayAcid
    sound: /Audio/_RMC14/Xeno/burrowing_b.ogg
    acid: CCMXenoBurrowerImpalerSpike
    doAfter: 0.2
    barricadeDuration: 0
    barricadeDamage:
      types:
        Heat: 0
  - type: MeleeWeapon
    range: 0
    damage:
      groups:
        Brute: 0
  - type: RemoveComponents
    components:
    - type: RMCXenoDamageVisuals
      prefix: burrower
    - type: XenoEvolution
      strains: # CCM Change
      - CCMXenoBurrowerImpaler
# Polymorph
- type: polymorph
  id: CCMJauntBurrow
  configuration:
    entity: CCMBurrowerBurrowedJaunt
    transferName: true
    inventory: None
    forced: true
    revertOnDeath: true
    revertOnCrit: true
    allowRepeatedMorphs: false
    polymorphSound: /Audio/_RMC14/Xeno/burrowing_b.ogg
    exitPolymorphSound: /Audio/_RMC14/Xeno/burrowoff.ogg
    duration: 3
