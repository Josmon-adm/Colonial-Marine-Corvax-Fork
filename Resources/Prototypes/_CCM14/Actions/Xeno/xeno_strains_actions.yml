- type: entity
  parent: ActionXenoBase
  id: CCMActionXenoBoxerStand
  name: Face to face
  description: Root an enemy for 3 seconds.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: agility_off
    useDelay: 30
  - type: TargetAction
    range: 1.5
    deselectOnMiss: false
  - type: EntityTargetAction
    event: !type:XenoCleaveActionEvent
  - type: ActionBlockIfResting

- type: entity
  parent: ActionXenoBase
  id: CCMActionXenoBoxerComeToMe
  name: Come to ME!
  description: Hook enemy to you up for 4 tiles, for 2.5 range.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: abduct
    useDelay: 20
  - type: TargetAction
    range: 2.5
    deselectOnMiss: false
  - type: EntityTargetAction
    event: !type:XenoCleaveActionEvent
      flings: true
  - type: ActionBlockIfResting

- type: entity
  id: CCMActionXenoBasherLegsOff
  parent: ActionXenoFling
  name: Legs off
  description: Fling in legs an enemy, dealing a medium damage with medium knockback. Add "Breaked bones" effect, that slows and stuns every 2 seconds.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: mark_attack
    useDelay: 30
  - type: ActionSharedCooldown
    id: CCMActionXenoBasherLegsOff
    ids:
    - CCMActionXenoBasherCrushingDaBones
    - CCMActionXenoBasherHighFlyHead
    cooldown: 30

- type: entity
  id: CCMActionXenoBasherHighFlyHead
  parent: ActionXenoPunch
  name: High fly head
  description: Punch an enemy in head, dealing a high damage with slight knockback. Add "Stars in eyes" effect, that deals asphyxiation damage and stuns every 4 seconds.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: prae_crush
    useDelay: 30
  - type: ActionSharedCooldown
    id: ActionXenoCleaveRoot
    ids:
    - CCMActionXenoBasherLegsOff
    - CCMActionXenoBasherCrushingDaBones
    cooldown: 30

- type: entity
  id: CCMActionXenoBasherCrushingDaBones
  parent: ActionXenoTailJab
  name: Crushing Da' Bones
  description: Punch enemy in chest, delaing low damage with high knockback & stun. Add "Breaked bones" effect, that deals high brute damage.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: prae_pierce
    useDelay: 30
  - type: ActionSharedCooldown
    id: CCMActionXenoBasherCrushingDaBones
    ids:
    - CCMActionXenoBasherLegsOff
    - CCMActionXenoBasherHighFlyHead
    cooldown: 30

- type: entity
  parent: ActionXenoApplySalve
  id: CCMActionXenoBoyGuardSave
  name: SAVE (-150)
  description: Apply a heal that heal other xeno for 100 health, but hurts you and give you plasma
  components:
  - type: Action
    itemIconStyle: NoItem
    backgroundOn: null
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: warden_heal
    useDelay: 10
  - type: EntityTargetAction
    event: !type:XenoApplySalveActionEvent
      plasmaCostModifier: -1.5
      timeBetweenHeals: 0.25
      totalHealDuration: 1.25

- type: entity
  id: CCMActionXenoBodyGuardGuard
  parent: ActionXenoTailLash
  name: GUARD (100)
  description: Charge a strong tail fling and fling enemy in 2x2 box (maybe bigger sometimes)
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: warden_rejuvenate
    useDelay: 5
  - type: XenoActionPlasma
    cost: 100

- type: entity
  parent: ActionXenoTantrum
  id: CCMActionXenoBodyGuardProtect
  name: PROTECT (100)
  description: Give an ally 15 armor for 6 second.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: warden_shield
    useDelay: 4

- type: entity
  id: CCMActionXenoScatteredSpitSniper
  parent: ActionXenoScatteredSpit
  name: Structure scattered spit (105) # TODO RMC14 proper plasma costs
  description: Spit scattered anti-structure and anti-barricade spit
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: acid_shotgun
    useDelay: 7

- type: entity
  id: CCMActionXenoSpitSniperMulti
  parent: ActionXenoSpit
  name: Sniper spits (84/70)
  description: Spit pain or acid spit
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: acid_lance
    useDelay: 10

- type: entity
  parent: ActionXenoToggleSpitType
  id: CCMActionXenoToggleSpitTypeSniper
  name: Change spit type
  description: Change from pain spit, that cause slow and pain. To acid spit that deals great burns with AP
  components:
  - type: Action
    itemIconStyle: NoItem
    backgroundOn: null
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: shift_spit_neurotoxin
    iconOn:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: shift_spit_xeno_acid
  - type: InstantAction
    event: !type:XenoSpitToggleActionEvent

- type: entity
  id: CCMActionXenoGreaterParalyzingSlash
  parent: ActionXenoParalyzingSlash
  name: Greater Paralyzing Slash (50) # TODO RMC14 proper plasma costs
  description: Temporarily charge up a melee attack that will stun a short time enemy after very shor delay

- type: entity
  parent: ActionXenoApprehend
  id: CCMActionXenoLightNeuroEmpower
  name: Light Neuro Empower
  description: Increases your movement speed and applies a slow on the next target you slash.

- type: entity
  id: CCMActionXenoScatteredSpitAcidicScatterShot
  parent: ActionXenoScatteredSpit
  name: Scattered acidic Spit (20) # TODO RMC14 proper plasma costs
  description: Launches multiple damageless projectiles that will deal serious damage at point blank distance


- type: entity
  id: CCMActionXenoScatterShotComeToMe
  parent: ActionXenoChargeSpit
  name: Come To Me (50) # TODO RMC14 proper plasma costs
  description: Charge your acid to make a shrapnel acid boom, need charge in 1.25 seconds. While charged gain armor and speed bost for 4 seconds.

- type: entity
  parent: BaseActionPolymorph
  id: CCMActionJauntBurrow
  name: Burrowing spike rush
  description: Dig in ground and them rush your enemies with your back spikes
  components:
  - type: Action
    useDelay: 27
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: tunnel
  - type: InstantAction
    event: !type:PolymorphActionEvent
      protoId: CCMJauntBurrow

- type: entity
  parent: ActionXenoSprayAcid
  id: CCMActionXenoBurrowerImpale
  name: Burrowed spikes (40)
  description: Strike with your spiked tail in ground 
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: prae_impale
    useDelay: 11

- type: entity
  parent: ActionXenoBase
  id: CCMActionXenoBurrowerDeepImpale
  name: Burrowed deep spike strike (70)
  description: Strike with your spikes under ground with long range
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: rav_eviscerate
    useDelay: 15
  - type: XenoAcidMine
    range: 5
    plasmaCost: 70
    blastProto: RMCEffectXenoBurrowerDeepImpaleTelegraph
    empoweredBlastProto: RMCEffectXenoBurrowerDeepImpaleTelegraph
    actionIconEmpowered:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: rav_eviscerate
  - type: TargetAction
    deselectOnMiss: false
    checkCanAccess: false
    repeat: true
    range: 5
  - type: WorldTargetAction
    event: !type:XenoAcidMineActionEvent
  - type: ActionBlockIfResting
